# fmz-dashboard（腾讯云 CVM / 任意 Linux）：仅 HTTPS，80 仅 ACME 与跳转
# TencentOS Server、OpenCloudOS、Alma 等 RHEL 系：由 tencent-cloud-setup.sh 写入 /etc/nginx/conf.d/
#
# 部署前将全文占位符 YOUR_DOMAIN_OR_IP 换成你的域名或服务器公网 IP，例如：
#   sed -i 's/YOUR_DOMAIN_OR_IP/dashboard.example.com/g' nginx-fmz-dashboard.conf
#
# 证书：默认示例路径为自签目录 /etc/ssl/fmz/（见 tencent-cloud-setup.sh）
# 有域名后改用 Let’s Encrypt：
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d dashboard.example.com
#然后按 certbot 提示更新下面 ssl_certificate 两行路径。

# —— HTTP：ACME 校验 + 其余301 到 HTTPS ——
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/fmz-dashboard;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# —— HTTPS ——
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_OR_IP;

    ssl_certificate     /etc/ssl/fmz/fullchain.pem;
    ssl_certificate_key /etc/ssl/fmz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_FMZ:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/fmz-dashboard;
    index index.html;

    # 须与官网 SPA 一致：伐木前端为 https://fmz.dongdongne.com （F12 里 API 请求的 Origin）
    set $fmz_upstream_browser_origin "https://fmz.dongdongne.com";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /__fmz_api/ {
        proxy_pass https://api2.dongdongne.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api2.dongdongne.com;
        proxy_set_header Origin $fmz_upstream_browser_origin;
        proxy_set_header Referer "$fmz_upstream_browser_origin/";
        # 与伪造 Origin 一致：主域页面调 api2 子域多为 same-site + cors
        proxy_set_header Sec-Fetch-Site "same-site";
        proxy_set_header Sec-Fetch-Mode "cors";
        proxy_set_header Sec-Fetch-Dest "empty";
        proxy_set_header Sec-Fetch-User "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 赞踩计数（本机 Node：cd /path/to/fmz-dashboard/server && npm i && npm start）
    # 重要：proxy_pass 必须是 http://127.0.0.1:8787/带末尾 /，否则会把 /__fmz_reactions 整段路径转发给 Node 导致 404
    location /__fmz_reactions/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 大话攻城快照（本机：node server/defense-tower-server.mjs，默认 8788）
    location /__fmz_defense/ {
        proxy_pass http://127.0.0.1:8788/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /doseeing/ {
        proxy_pass https://www.doseeing.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.doseeing.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
